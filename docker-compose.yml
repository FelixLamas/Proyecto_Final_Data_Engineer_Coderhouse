services:
  pipeline:
    build: .
    container_name: data_pipeline_container
    volumes:
      - .:/project
    working_dir: /project
    stdin_open: true
    tty: true
    ports:
      - "8000:8000"  # Expone el puerto de métricas del orquestador Python
    networks:
      - data_network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_container
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - data_network

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana_container
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      # Cargamos el archivo del proveedor en su ruta de provisioning
      - ./grafana/provisioning/dashboards/dashboard_provider.yml:/etc/grafana/provisioning/dashboards/provider.yml
      # Cargamos los JSONs en la ruta de recursos que configuramos en el provider
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
    networks:
      - data_network

volumes:
  grafana-storage:

networks:
  data_network:
    driver: bridge